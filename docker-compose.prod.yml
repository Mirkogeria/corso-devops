# docker-compose.prod.yml - Production
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    restart: always
    ports: []

  order-service:
    restart: always
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: warning
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
