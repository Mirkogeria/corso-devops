# docker-compose.yml - OrderFlow Complete Stack
# Settimana 3, Giorno 3 — Docker Compose
#
# Usage:
#   docker compose up -d --build    # Start all services
#   docker compose ps               # Check status
#   docker compose logs -f          # Follow logs
#   docker compose down             # Stop and remove (keep data)
#   docker compose down -v          # Stop and remove (delete data)

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orderflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-orderflow_orders}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - orderflow-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow -d orderflow_orders"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --- Order Service ---
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: orderflow-order
    image: corso-devops/order-service:latest
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://orderflow:orderflow_secret@postgres:5432/orderflow_orders
      INVENTORY_SERVICE_URL: http://inventory-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      SERVICE_NAME: order-service
      APP_ENV: ${APP_ENV:-development}
    networks:
      - orderflow-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # --- Inventory Service ---
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: orderflow-inventory
    image: corso-devops/inventory-service:latest
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://orderflow:orderflow_secret@postgres:5432/orderflow_inventory
      SERVICE_NAME: inventory-service
      APP_ENV: ${APP_ENV:-development}
    networks:
      - orderflow-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # --- Notification Service ---
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: orderflow-notification
    image: corso-devops/notification-service:latest
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://orderflow:orderflow_secret@postgres:5432/orderflow_notifications
      ORDER_SERVICE_URL: http://order-service:8000
      SERVICE_NAME: notification-service
      APP_ENV: ${APP_ENV:-development}
    networks:
      - orderflow-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

# --- Networks ---
networks:
  orderflow-net:
    driver: bridge16

# --- Volumes ---
volumes:
  pgdata:
    driver: local
