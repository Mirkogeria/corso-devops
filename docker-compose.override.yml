# docker-compose.override.yml - Development (auto-loaded)
services:
  order-service:
    volumes:
      - ./order-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
      LOG_LEVEL: debug

  # pgAdmin: solo con --profile debug
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orderflow-pgadmin
    profiles:
      - debug
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orderflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - orderflow-net
    depends_on:
      postgres:
        condition: service_healthy
